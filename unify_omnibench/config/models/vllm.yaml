# vLLM batch backend for Qwen2.5-Omni.
# Prompt / media construction is shared with the Transformers backend —
# only the generation engine differs.
name: vllm
model: Qwen/Qwen2.5-Omni-7B
tensor_parallel_size: 1
gpu_memory_utilization: 0.95
max_num_seqs: 4
# vLLM 引擎内部真实并发调度上限。run.py 会用 --workers/WORKERS 覆盖这个值
# （跟 concurrency.batch_size 保持一致，不用手动同步）；这里的 4 只是不经过
# run.py 直接 import VLLMModel 时的兜底默认值。
dtype: bfloat16
max_model_len: 32768
seed: 1234
concurrency_mode: batch
# 真实多prompt一次性提交给 vLLM（generate_batch()），配合上面的 max_num_seqs
# 做 continuous batching；某条样本触发 EngineDeadError 时该批会整体回退到
# 逐条重试（runner.py::_run_batched()），不会丢结果。
enforce_eager: true          # 对齐 vllm_stage_textonly.yaml，无副作用
enable_prefix_caching: false # 对齐 vllm_stage_textonly.yaml，无副作用
# 规避 vLLM 多模态处理器缓存（默认开启，4GB）对重复出现的同一视频返回 None
# 占位符、而 use_audio_in_video 自动检测未判空导致的 TypeError（上游未修复，
# 见 docs/Unify-OmniBench-v0.1.0-dev.md）。
mm_processor_cache_gb: 0
