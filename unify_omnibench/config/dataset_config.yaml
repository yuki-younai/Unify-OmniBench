# Unify-OmniBench 数据集配置。root为数据根目录；dataset下字段覆盖model yaml同名全局字段。
root: /apdcephfs_hldy/share_304318596/weiyangguo/Datasets/Unify-OmniBench

datasets:
  omnibench:
    data_file: data/omnibench.json
    modality: av
    use_audio_in_video: false
    system_prompt: "You are Qwen, a virtual human developed by the Qwen Team, Alibaba Group, capable of perceiving auditory and visual inputs, as well as generating text and speech."
    prompt_template: |
      Your task is to accurately answer multiple-choice questions based on the {media_desc}.
      Select the single most accurate answer from the given choices.
      Question: {question}
      Choices: {choices}
      Your answer should be a capital letter representing your choice: A, B, C, or D. Don't generate any other text.
    video:
      fps: 2.0
      max_frames: 768
      min_frames: 4

  daily_omni:
    data_file: data/daily_omni.json
    modality: av
    use_audio_in_video: false
    system_prompt: "You are Qwen, a virtual human developed by the Qwen Team, Alibaba Group, capable of perceiving auditory and visual inputs, as well as generating text and speech."
    prompt_template: |
      Your task is to accurately answer multiple-choice questions based on the {media_desc}.
      Select the single most accurate answer from the given choices.
      Question: {question}
      Choices: {choices}
      Your answer should be a capital letter representing your choice: A, B, C, or D. Don't generate any other text.
    video:
      fps: 2.0
      max_frames: 768
      min_frames: 4

  omnivideobench:
    data_file: data/omnivideobench.json
    modality: av
    use_audio_in_video: true
    # 原始实现 FPS_MAX_FRAMES=120 对应 128K 上下文窗口，vLLM 只有 32K
    # （1/4），按比例缩帧数+像素预算，避免 prompt 超 max_model_len=32768
    video:
      fps: 2.0
      max_frames: 64          # 120 * 32K/128K ≈ 30，稍宽裕取 48
      min_frames: 4
      min_pixels: 100352
      max_pixels: 602112
      total_pixels: 36126720   # 90316800 * 32K/128K * 48/120，对应 per-frame 602K 上限
    system_prompt: "You are Qwen, a virtual human developed by the Qwen Team, Alibaba Group, capable of perceiving auditory and visual inputs, as well as generating text and speech."
    prompt_template: |
      You are given a video. Based on the content of the video, answer the following question:

      Question:
      {question}

      Options:
      {choices}

      Answer with the option's letter directly(e.g., A, B, C, or D).If your access to the video content is limited, at least one option that is more likely than the others must be chosen.Mustn't give any other reason for can not choose!

  videomme:
    data_file: data/videomme.json
    modality: v
    use_audio_in_video: false
    video:
      fps: 2.0
      max_frames: 64           # 对齐 VLMEvalKit 默认 64frame 预设
      min_frames: 4
      min_pixels: 100352
      max_pixels: 602112
      total_pixels: 19267584
    system_prompt: "You are Qwen, a virtual human developed by the Qwen Team, Alibaba Group, capable of perceiving visual inputs, as well as generating text and speech."
    prompt_template: |
      These are the frames of a video. Select the best answer to the following multiple-choice question based on the video. Respond with only the letter (A, B, C, or D) of the correct option.

      Question: {question}
      {choices}
      Answer:

  worldsense:
    data_file: data/worldsense.json
    modality: av
    # 只用交织模式：音频从视频容器自带音轨提取，不额外挂独立audio文件
    # （跟 VLMEvalKit 参考实现相比更简单——参考实现会同时挂交织+独立音频，
    # 等于把同一段音频喂两遍，这里选择只喂一遍）。
    use_audio_in_video: true
    video:
      fps: 2.0  # 对齐 VLMEvalKit（Qwen2VLChat 模型默认 fps=2）
      max_frames: 64  # 对齐 VLMEvalKit Qwen2-VL 默认值
      min_frames: 4
      min_pixels: 100352
      max_pixels: 602112
      total_pixels: 19267584
    system_prompt: "Carefully watch this video and pay attention to every detail. Based on your observations, select the best option that accurately addresses the question."
    prompt_template: |
      These are the frames of a video and the corresponding audio. Select the best answer to the following multiple-choice question based on the video. Respond with only the letter (A, B, C, or D) of the correct option.

      Question: {question}
      {choices}
      Answer: 
